<article class="text--justified">
  <header><h2>Characters</h2></header>

  <table *ngIf="characters">
    <thead>
    <tr>
      <th>Name</th>
      <th>View</th>
      <th>Edit</th>
      <th>Delete</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let character of characters.drivers">
      <td>{{character.driverName}} {{character.driverSurname}}</td>
      <td>
        <a [routerLink]="['/drivers', character.driverID]">View</a>
      </td>
      <td>
        <a [routerLink]="['/drivers', character.driverID, 'edit']">Edit</a>
      </td>
      <td>
        <button (click)="onDelete(character)">Delete</button>
      </td>
    </tr>
    </tbody>
  </table>
  <a [routerLink]="['/drivers/create']">Create</a>
</article>
