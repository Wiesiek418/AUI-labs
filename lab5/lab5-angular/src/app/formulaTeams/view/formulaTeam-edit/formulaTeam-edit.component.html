<article *ngIf="formulaTeam">
  <header><h2>Edit character</h2></header>

  <form class="container"  #form="ngForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-4 p-2">
        <div>
          <label for="name">Name:</label>
          <input id="name" name="name" [(ngModel)]="formulaTeam.formulaTeamName"/>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-4 p-2">
        <div>
          <label for="surname">nationality:</label>
          <input id="surname" name="surname" [(ngModel)]="formulaTeam.formulaTeamNationality"/>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-4 p-2">
        <div>
          <label for="nationality">WCC:</label>
          <input id="nationality" name="nationality" [(ngModel)]="formulaTeam.formulaTeamWCCTitles"/>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-4 p-2">
        <div>
          <label for="wdcTitles">Year founded:</label>
          <input id="wdcTitles" name="wdcTitles" [(ngModel)]="formulaTeam.formulaTeamYearFounded"/>
        </div>
      </div>
    </div>


    <div class="row">
      <div class="col-2 p-2">
        <button type="submit">Update</button>
      </div>
      <div class="col-2 p-2">
        <button type="button" (click)="form.resetForm(original)">Reset</button>
      </div>
    </div>
  </form>
</article>
