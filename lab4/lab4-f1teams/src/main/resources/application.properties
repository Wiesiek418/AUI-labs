server.port=8082


spring.application.name=lab4F1Teams
spring.datasource.url=jdbc:postgresql://teams-db:5432/teams_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=teams_user
spring.datasource.password=teams_password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.h2.console.enabled=true

spring.liquibase.change-log=classpath:/liquibase/master.xml

eureka.client.service-url.defaultZone=http://localhost:8085/eureka
eureka.instance.appname=${spring.application.name}
eureka.instance.instance-id=${server.port}
eureka.instance.lease-expiration-duration-in-seconds=5
eureka.instance.lease-renewal-interval-in-seconds=2

